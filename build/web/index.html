import sys
import asyncio
import platform
import json
from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#f8f9fa"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"


    bundle = "circuitsim"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/circuitsim
    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("circuitsim.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("circuitsim.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # TODO: test for window.webkitAudioContext and block aio loop until gesture if accessing media manager play
    # before a gesture is recorded ( touch or click )

    # test/wait user media interaction
    if not platform.window.MM.UME:

        # now that apk is mounted we have access to font cache
        # but we need to fill __file__ that is not yet set
        __import__(__name__).__file__ = main

        # now make a prompt
        msg  = "Ready to start ! Please click/touch page"
        platform.window.infobox.style.display = "none"; platform.window.infobox.innerText = msg
        print("\n"*4, f"    * Waiting for media user engagement. {msg} *" , "\n"*4)

        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main


    def ui_callback(pkg):
        pass  # platform.window.infobox.innerText = f"installing {pkg}"

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

asyncio.run( custom_site() )

    infobox.style.display = "block";

    // Measure box
    const w = infobox.offsetWidth;
    const h = infobox.offsetHeight;

    // Center in viewport
    const left = (window.innerWidth - w) / 2;
    const top = (window.innerHeight - h) / 2;

    infobox.style.top = top + "px";

<script>
    var _clProgress = 0;
    var _clInterval = null;

    // Animate the progress bar up to 90% while loading
    _clInterval = setInterval(function() {
        _clProgress += Math.random() * 3;
        if (_clProgress >= 90) {
            _clProgress = 90;
            clearInterval(_clInterval);
        }
        document.getElementById('cl-bar-fill').style.width = _clProgress + '%';
    }, 250);

    // Watch for pygbag's infobox changing to "Ready to start"
    // That's our signal that loading is complete
    var _clObserver = new MutationObserver(function() {
        var infobox = document.getElementById('infobox');
        if (infobox && infobox.innerText.indexOf('Ready') >= 0) {
            clReady();
        }
    });

    window.addEventListener('load', function() {
        var infobox = document.getElementById('infobox');
        if (infobox) {
            _clObserver.observe(infobox, { childList: true, characterData: true, subtree: true });
        }
    });

    function clReady() {
        clearInterval(_clInterval);
        _clObserver.disconnect();
        document.getElementById('cl-bar-fill').style.width = '100%';
        document.getElementById('cl-status').textContent = 'Ready!';
        setTimeout(function() {
            document.getElementById('cl-progress-area').style.display = 'none';
            document.getElementById('cl-start-wrap').style.display = 'flex';
        }, 400);
    }

    function clStart() {
        // Simulate the click that pygbag needs to unlock audio
        document.getElementById('canvas').click();
        document.getElementById('custom-loading').classList.add('hidden');
        document.getElementById('cl-author').style.display = 'none';
        setTimeout(function() {
            var el = document.getElementById('custom-loading');
            if (el) el.remove();
        }, 500);
    }
</script>
